name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test
        run: uv run pytest

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect frontend app
        id: detect
        run: |
          if [ -d frontend/src ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "No frontend/src yet — skipping build (added in feature 17-frontend-mvp)."
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.build == 'true'
        with:
          node-version: 20
      - name: Install dependencies
        if: steps.detect.outputs.build == 'true'
        working-directory: frontend
        run: npm install
      - name: Build
        if: steps.detect.outputs.build == 'true'
        working-directory: frontend
        run: npm run build
